<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#07080a" />
    <title>404 — not in production · ProdScript</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        box-sizing: border-box;
      }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
        background: #07080a;
        color: #f3f5f7;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
        background-image: radial-gradient(
          60% 50% at 50% 0%,
          rgba(255, 68, 56, 0.16),
          transparent 70%
        );
      }
      .code {
        font-family: ui-monospace, "JetBrains Mono", Consolas, monospace;
        font-size: 0.78rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #ff8a82;
        display: inline-flex;
        align-items: center;
        gap: 0.6em;
        padding: 0.45em 0.9em;
        border: 1px solid rgba(255, 68, 56, 0.32);
        border-radius: 999px;
        background: rgba(255, 68, 56, 0.1);
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ff4438;
      }
      h1 {
        font-size: clamp(4rem, 18vw, 9rem);
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 1;
        margin: 1.4rem 0 0.6rem;
      }
      p {
        color: #b0b6bf;
        font-size: 1.1rem;
        max-width: 40ch;
        margin: 0 auto 2rem;
        line-height: 1.6;
      }
      a {
        display: inline-flex;
        align-items: center;
        gap: 0.5em;
        background: linear-gradient(180deg, #ff6b61, #ff4438);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        padding: 0.8em 1.4em;
        border-radius: 999px;
        box-shadow: 0 22px 60px -22px rgba(255, 68, 56, 0.6);
      }
    </style>
  </head>
  <body>
    <main>
      <span class="code"><span class="dot"></span>404 · not deployed</span>
      <h1>404</h1>
      <p>
        This page is not in production yet — and around here, that is the only
        place anything exists.
      </p>
      <a href="/">Back to production →</a>
    </main>
  </body>
</html>
