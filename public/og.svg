<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="10%" r="78%">
      <stop offset="0%" stop-color="#ff4438" stop-opacity="0.30" />
      <stop offset="38%" stop-color="#ff4438" stop-opacity="0.06" />
      <stop offset="72%" stop-color="#ff4438" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffd9d4" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#07080a" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="0.5" y="0.5" width="1199" height="629" fill="none" stroke="rgba(255,255,255,0.06)" />

  <!-- live badge -->
  <g transform="translate(80,82)">
    <rect width="306" height="48" rx="24" fill="rgba(255,68,56,0.10)" stroke="rgba(255,68,56,0.34)" />
    <circle cx="27" cy="24" r="6" fill="#ff4438" />
    <text x="48" y="31" font-family="'JetBrains Mono','Consolas',monospace" font-size="18" letter-spacing="3" fill="#ff8a82">LIVE IN PRODUCTION</text>
  </g>

  <!-- wordmark -->
  <text x="76" y="330" font-family="Arial, Helvetica, sans-serif" font-size="150" font-weight="800" letter-spacing="-5">
    <tspan fill="url(#ink)">Prod</tspan><tspan fill="#ff4438">Script</tspan>
  </text>

  <!-- tagline -->
  <text x="82" y="406" font-family="Arial, Helvetica, sans-serif" font-size="44" font-weight="500" fill="#b0b6bf">The best way to build.</text>

  <!-- terminal line -->
  <text x="82" y="498" font-family="'JetBrains Mono','Consolas',monospace" font-size="26">
    <tspan fill="#ff6b61">$ </tspan><tspan fill="#e8eaed">prodscript deploy --to prod</tspan><tspan fill="#38d07f">   ✓ live in 0.41s</tspan>
  </text>

  <!-- footer -->
  <text x="80" y="582" font-family="'JetBrains Mono','Consolas',monospace" font-size="20" fill="#5c636e">prodscript.com</text>
  <text x="1120" y="582" text-anchor="end" font-family="'JetBrains Mono','Consolas',monospace" font-size="20" fill="#5c636e">no build · no types · no staging</text>
</svg>
